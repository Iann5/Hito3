version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: chatbot_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_nueva:/var/lib/postgresql/data
      # Esto lee tu archivo init.sql y crea la tabla automáticamente
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bot_network

  ollama:
    image: ollama/ollama
    container_name: chatbot_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - bot_network

  n8n:
    image: n8nio/n8n
    container_name: chatbot_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      # Le decimos a n8n que use nuestra base de datos Postgres
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - bot_network

  qdrant:
    image: qdrant/qdrant
    container_name: chatbot_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - bot_network

volumes:
  postgres_data_nueva:
  ollama_data:
  n8n_data:
  qdrant_data:

networks:
  bot_network:
    driver: bridge